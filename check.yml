name: check-proxies

on:
  schedule:
    # Every 10 minutes. GitHub's minimum is 5m and scheduled runs can be
    # delayed under load, so treat this as "roughly every 10 minutes".
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # lets you trigger a run by hand from the Actions tab

# Never let two runs overlap (they'd fight over the same commit).
concurrency:
  group: proxy-check
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit proxies.json back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r checker/requirements.txt

      - name: Run checker
        env:
          CONCURRENCY: "600"
          TIMEOUT: "8"
          MAX_FAILS: "2"
        run: python -m checker.main

      - name: Commit results
        run: |
          git config user.name "proxy-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/proxies.json docs/data/state.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "update proxies $(date -u +%FT%TZ)"
            git push
          fi
